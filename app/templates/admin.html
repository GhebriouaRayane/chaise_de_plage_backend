<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Beach Chair Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <div id="login-screen" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
            <h1 class="text-2xl font-bold mb-6 text-center">Connexion Admin</h1>
            <div class="space-y-4">
                <input type="text" id="username" placeholder="Nom d'utilisateur" class="w-full px-4 py-3 rounded-xl border focus:ring-2 focus:ring-blue-500 outline-none">
                <input type="password" id="password" placeholder="Mot de passe" class="w-full px-4 py-3 rounded-xl border focus:ring-2 focus:ring-blue-500 outline-none">
                <button onclick="login()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold hover:bg-blue-700 transition">Se connecter</button>
            </div>
            <p id="login-error" class="text-red-500 text-sm mt-4 text-center hidden">Identifiants incorrects</p>
        </div>
    </div>

    <div id="admin-panel" class="hidden min-h-screen flex flex-col">
        <nav class="bg-white border-b px-8 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-600">Beach Chair Admin</h1>
            <div class="flex items-center gap-4">
                <span id="admin-name" class="text-sm font-medium"></span>
                <button onclick="logout()" class="text-sm text-red-600 hover:underline">Déconnexion</button>
            </div>
        </nav>

        <main class="flex-1 p-8 max-w-7xl mx-auto w-full">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold">Gestion des Commandes</h2>
                <div class="flex gap-4">
                    <input type="text" id="search" oninput="loadOrders()" placeholder="Rechercher..." class="px-4 py-2 rounded-lg border outline-none">
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b">
                        <tr>
                            <th class="px-6 py-4 font-semibold text-sm">N° Commande</th>
                            <th class="px-6 py-4 font-semibold text-sm">Client</th>
                            <th class="px-6 py-4 font-semibold text-sm">Produit</th>
                            <th class="px-6 py-4 font-semibold text-sm">Total</th>
                            <th class="px-6 py-4 font-semibold text-sm">Statut</th>
                            <th class="px-6 py-4 font-semibold text-sm">Date</th>
                            <th class="px-6 py-4 font-semibold text-sm">Action</th>
                        </tr>
                    </thead>
                    <tbody id="orders-list">
                        <!-- Orders will be loaded here -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        let token = localStorage.getItem('admin_token');
        const API_URL = '/api/v1';

        if (token) {
            showPanel();
        }

        async function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorEl = document.getElementById('login-error');

            const formData = new FormData();
            formData.append('username', user);
            formData.append('password', pass);

            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    body: formData
                });
                
                if (res.ok) {
                    const data = await res.json();
                    token = data.access_token;
                    localStorage.setItem('admin_token', token);
                    showPanel();
                } else {
                    errorEl.classList.remove('hidden');
                }
            } catch (e) {
                console.error(e);
            }
        }

        function logout() {
            localStorage.removeItem('admin_token');
            location.reload();
        }

        function showPanel() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('admin-panel').classList.remove('hidden');
            loadOrders();
        }

        async function loadOrders() {
            const search = document.getElementById('search').value;
            const res = await fetch(`${API_URL}/orders/?search=${search}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            
            if (res.status === 401) return logout();
            
            const orders = await res.json();
            const list = document.getElementById('orders-list');
            list.innerHTML = orders.map(o => `
                <tr class="border-b hover:bg-gray-50">
                    <td class="px-6 py-4 font-medium text-blue-600">${o.order_number}</td>
                    <td class="px-6 py-4">
                        <div class="font-semibold">${o.nom} ${o.prenom}</div>
                        <div class="text-xs text-gray-500">${o.telephone}</div>
                    </td>
                    <td class="px-6 py-4 text-sm">${o.quantity}x ${o.product_name}</td>
                    <td class="px-6 py-4 font-bold">${o.total_price} DA</td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 rounded-full text-xs font-semibold ${getStatusClass(o.status)}">
                            ${o.status}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-xs text-gray-500">${new Date(o.created_at).toLocaleDateString()}</td>
                    <td class="px-6 py-4">
                        <select onchange="updateStatus(${o.id}, this.value)" class="text-xs border rounded p-1 outline-none">
                            <option value="En attente" ${o.status === 'En attente' ? 'selected' : ''}>En attente</option>
                            <option value="Confirmée" ${o.status === 'Confirmée' ? 'selected' : ''}>Confirmée</option>
                            <option value="Expédiée" ${o.status === 'Expédiée' ? 'selected' : ''}>Expédiée</option>
                            <option value="Livrée" ${o.status === 'Livrée' ? 'selected' : ''}>Livrée</option>
                            <option value="Annulée" ${o.status === 'Annulée' ? 'selected' : ''}>Annulée</option>
                        </select>
                    </td>
                </tr>
            `).join('');
        }

        async function updateStatus(id, status) {
            await fetch(`${API_URL}/orders/${id}`, {
                method: 'PATCH',
                headers: { 
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ status })
            });
            loadOrders();
        }

        function getStatusClass(status) {
            switch(status) {
                case 'En attente': return 'bg-yellow-100 text-yellow-700';
                case 'Confirmée': return 'bg-blue-100 text-blue-700';
                case 'Expédiée': return 'bg-purple-100 text-purple-700';
                case 'Livrée': return 'bg-green-100 text-green-700';
                case 'Annulée': return 'bg-red-100 text-red-700';
                default: return 'bg-gray-100 text-gray-700';
            }
        }
    </script>
</body>
</html>
